name: Build

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential gcc-i686-linux-gnu binutils-i686-linux-gnu yasm grub-common grub-pc-bin xorriso mtools

      - name: Set up cross-compiler shims
        run: |
          # 64-bit core sub-Makefiles hardcode x86_64-elf-* names; native gcc is already x86_64.
          # -no-pie is required because Ubuntu's ld defaults to PIE, which breaks bare-metal linking.
          printf '#!/bin/sh\nexec gcc -no-pie "$@"\n' | sudo tee /usr/local/bin/x86_64-elf-gcc > /dev/null
          sudo chmod +x /usr/local/bin/x86_64-elf-gcc
          sudo ln -s /usr/bin/ld  /usr/local/bin/x86_64-elf-ld
          sudo ln -s /usr/bin/ar  /usr/local/bin/x86_64-elf-ar

          # grub-mkrescue is already available; expose it under the Homebrew name used in the Makefile
          sudo ln -s /usr/bin/grub-mkrescue /usr/local/bin/i686-elf-grub-mkrescue

      - name: Build ISO
        run: make CROSS_COMPILE=i686-linux-gnu- GRUB_MKRESCUE=grub-mkrescue iso

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hypov-${{ github.sha }}
          path: |
            hypov.iso
            hypov.bin
            HypoV.map
            sys/core/hvcore.elf64
            sys/core/hvcore.elf64.xz

  vmx-test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Check KVM availability
        run: |
          ls -la /dev/kvm
          grep -E 'vmx|svm' /proc/cpuinfo | head -3 || echo "No VMX/SVM in cpuinfo"
          cat /proc/sys/kernel/perf_event_paranoid || true

      - name: Enable nested KVM
        id: kvm
        run: |
          if grep -q vmx /proc/cpuinfo; then
            echo "Intel VMX detected — enabling nested KVM"
            sudo modprobe -r kvm_intel 2>/dev/null || true
            echo "options kvm_intel nested=1" | sudo tee /etc/modprobe.d/kvm.conf
            sudo modprobe kvm_intel nested=1
            cat /sys/module/kvm_intel/parameters/nested
            echo "intel=true" >> $GITHUB_OUTPUT
          else
            echo "No Intel VMX (AMD runner or no KVM) — skipping VMX boot test"
            echo "intel=false" >> $GITHUB_OUTPUT
          fi

      - name: Install QEMU
        if: steps.kvm.outputs.intel == 'true'
        run: sudo apt-get install -y --no-install-recommends qemu-system-x86

      - name: Download ISO
        if: steps.kvm.outputs.intel == 'true'
        uses: actions/download-artifact@v4
        with:
          name: hypov-${{ github.sha }}

      - name: Grant KVM access
        if: steps.kvm.outputs.intel == 'true'
        run: sudo chmod 666 /dev/kvm

      - name: Boot HypoV and capture serial output
        if: steps.kvm.outputs.intel == 'true'
        run: |
          timeout 30 qemu-system-x86_64 \
            -enable-kvm -cpu host -m 512 -M q35 \
            -boot d -cdrom hypov.iso \
            -serial file:serial.log \
            -display none \
            -no-reboot || true
          echo "=== Serial output ==="
          cat serial.log || echo "(no serial output)"

      - name: Check VMX activated
        if: steps.kvm.outputs.intel == 'true'
        run: |
          echo "=== Serial log ==="
          cat serial.log
          grep -q "VMX: active" serial.log && echo "PASS: VMX activated successfully" \
            || { echo "FAIL: VMX not activated"; exit 1; }

      - name: VMX test skipped
        if: steps.kvm.outputs.intel != 'true'
        run: echo "VMX test skipped — Intel KVM not available on this runner (AMD CPU)"
